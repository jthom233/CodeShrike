<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeShrike Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>CodeShrike</h1>
      <nav id="nav">
        <button data-view="suites" class="active">Suites</button>
        <button data-view="coverage">Coverage</button>
      </nav>
    </header>
    <main id="main"></main>
    <footer class="shortcut-footer">
      <span class="shortcut"><kbd>j</kbd>/<kbd>k</kbd></span> navigate
      <span class="shortcut-sep">·</span>
      <span class="shortcut"><kbd>Enter</kbd></span> open
      <span class="shortcut-sep">·</span>
      <span class="shortcut"><kbd>/</kbd></span> filter
      <span class="shortcut-sep">·</span>
      <span class="shortcut"><kbd>?</kbd></span> shortcuts
    </footer>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
